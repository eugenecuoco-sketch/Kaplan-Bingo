<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KCA 2.0 UAT Bingo Generator</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load HTML2Canvas and JsPDF for PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        /* Custom font import and application */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f7f9;
        }
        /* Custom CSS for the grid lines */
        .bingo-grid {
            grid-template-columns: repeat(5, minmax(0, 1fr));
            border-left: 2px solid #1f2937;
            border-top: 2px solid #1f2937;
        }
        .bingo-cell {
            border-right: 2px solid #1f2937;
            border-bottom: 2px solid #1f2937;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            font-size: 0.875rem; /* sm */
            text-align: center;
            font-weight: 500;
            background-color: #ffffff;
            line-height: 1.25;
        }
        .bingo-header {
            background-color: #3b82f6; /* Blue 500 */
            color: white;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 1.125rem; /* lg */
            padding: 12px 8px;
        }
        .free-space {
            background-color: #ef4444; /* Red 500 */
            color: white;
            font-weight: 700;
            font-size: 1.125rem; /* lg */
        }
    </style>
</head>
<body class="p-4 sm:p-8">

    <div class="max-w-4xl mx-auto">
        
        <header class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-gray-800 mb-2">KCA 2.0 UAT Bingo</h1>
            <p class="text-gray-600 text-lg">Spot the classic phrases during the Demo, UAT, and Launch!</p>
        </header>

        <!-- Control Buttons -->
        <div class="flex flex-col sm:flex-row gap-4 justify-center mb-8">
            <button id="generateBtn" 
                class="flex-1 px-6 py-3 bg-indigo-600 text-white font-bold rounded-xl shadow-lg hover:bg-indigo-700 transition duration-150 transform hover:scale-105">
                Generate New Card
            </button>
            <button id="downloadBtn" 
                class="flex-1 px-6 py-3 bg-green-600 text-white font-bold rounded-xl shadow-lg hover:bg-green-700 transition duration-150 transform hover:scale-105"
                disabled>
                Download PDF
            </button>
        </div>

        <!-- Bingo Card Container -->
        <div id="bingoCardContainer" class="bg-white rounded-2xl shadow-2xl overflow-hidden p-4 sm:p-6" style="min-height: 600px;">
            <p class="text-center text-gray-500 mt-20">Click 'Generate New Card' to start the fun!</p>
        </div>

    </div>

    <script>
        // Phase 1: Data Setup
        const HEADERS = ["Demo", "UAT 1", "UAT 2", "UAT 3", "Launch"];
        const FREE_SPACE = "THAT DOESN'T LOOK RIGHT";
        const PHRASES = [
            "**Iterative**",
            "**Ready before launch**",
            "**What's the transaction code?**",
            "**That will be Dev work**",
            "**Terms & Conditions**",
            "**What's the Product Code?**",
            "**PDP**",
            "**Grad Year**",
            "**Agent experience**",
            "**Student experience**",
            "**Parent experience**",
            "**What's the Product Code?**",
            "**Tech is looking into that**",
            "**Are they on the Meeting?**",
            "**Did anyone get the emails?**",
            "**The coupon code works!**",
            "**Is this a separate sprint?**",
            "**Configurator**",
            "**The parent EID is missing**",
            "**We're testing in production**",
            "**Database script**",
            "**We need SOPs by launch**",
            "**99% off**",
            "**Coupon code**",
            "**Refresh the page**",
            "**That's a nightly job**",
            "**Check with Legal**",
            "**Alphacart**",
            "**The cart price is wrong**",
            "**Did we track the EID?**",
            "**It's a known defect**",
            "**Student selects classes**",
            "**Share screen**",
            "**Fast follow?**",
            "**Who has the credit card?**",
            "**It's Installment Billing**",
            "**The expiration date is wrong**",
            "**They don’t have access**",
            "**Age gating?**",
            "**This requires rework**",
            "**The data is not realtime**",
            "**Is this a policy decision?**",
            "**The browser is unsupported**",
            "**No, you must buy twice**",
            "**We need to record this**",
            "**It links back to T&C**",
            "**The integration failed**",
            "**Customers will game the system**",
            "**Balance due**",
            "**Change the product name**",
            "**Are we good?**",
            "**Enrollment agreement?**",
            "**The physical kits are shipping**",
            "**Are we out of time?**",
            "**Did you clear the cache?**",
            "**We need BI to verify**",
            "**It shouldn't trigger a refund**",
            "**Who owns this requirement?**",
            "**Need to test all 24 bundles**",
            "**Dynamic content**",
            "**That's a placeholder product**",
            "**Email dot-alias**",
            "**The card is maxxed out**",
            "**Is it supposed to?**",
            "**Those weren't the requirements**",
            "**We'll need a workaround**",
            "**That worked smoothly!**",
            "**Customer experience**",
            "**Confluence**",
            "**Is that what an agent sees?**",
            "**It's a subscription**",
            "**That's a business decision**",
            "**Who needs to sign off on that?**",
            "**Accounting's not going to like that**",
            "**Is that current state?**",
            "**We are aligned**"
            "**Congratulations**"
            "**That worked**"
        ];

        const container = document.getElementById('bingoCardContainer');
        const generateBtn = document.getElementById('generateBtn');
        const downloadBtn = document.getElementById('downloadBtn');

        // Utility to shuffle an array (Fisher-Yates)
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // Phase 2: Card Generation Logic
        function generateCard() {
            // 1. Clear container and reset button state
            container.innerHTML = '';
            downloadBtn.disabled = true;

            // 2. Select 24 unique phrases
            const shuffledPhrases = [...PHRASES];
            shuffleArray(shuffledPhrases);
            const selectedPhrases = shuffledPhrases.slice(0, 24);

            // 3. Insert free space at index 12 (the 13th cell)
            selectedPhrases.splice(12, 0, FREE_SPACE);

            // 4. Create the grid structure (5x5, total 25 cells)
            const grid = document.createElement('div');
            grid.className = 'grid bingo-grid w-full h-full';
            grid.id = 'bingoGrid';

            // 5. Populate headers
            HEADERS.forEach(header => {
                const headerCell = document.createElement('div');
                headerCell.className = 'bingo-header flex items-center justify-center border-r-2 border-b-2 border-gray-800';
                headerCell.textContent = header;
                grid.appendChild(headerCell);
            });

            // 6. Populate cells
            selectedPhrases.forEach((phrase, index) => {
                const cell = document.createElement('div');
                
                // Replace **bold** with <strong> for HTML rendering
                let content = phrase.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>'); 

                cell.innerHTML = content;
                cell.className = 'bingo-cell cursor-pointer transition duration-150 hover:bg-gray-100';
                cell.setAttribute('data-index', index);
                
                // Add specific class for the free space
                if (index === 12) {
                    cell.classList.add('free-space');
                    cell.classList.remove('hover:bg-gray-100');
                    cell.classList.remove('cursor-pointer');
                } else {
                    // Add click handler for marking/unmarking
                    cell.addEventListener('click', () => {
                        cell.classList.toggle('bg-yellow-300'); // Use yellow to mark
                        cell.classList.toggle('bg-white');
                    });
                }

                grid.appendChild(cell);
            });

            container.appendChild(grid);
            downloadBtn.disabled = false;
        }

        // Phase 3: PDF Download Logic
        async function downloadPDF() {
            downloadBtn.disabled = true;
            downloadBtn.textContent = 'Preparing PDF...';
            
            // The canvas must be outside the main container to avoid sizing issues
            const input = document.getElementById('bingoGrid');
            const originalScale = 2; // Increased scale for better resolution

            const canvas = await html2canvas(input, {
                scale: originalScale,
                backgroundColor: '#ffffff', // Ensure white background
                useCORS: true,
                logging: false,
            });

            const imgData = canvas.toDataURL('image/png');
            const { jsPDF } = window.jspdf;
            
            // Standard A4 dimensions in pt (595.28 x 841.89)
            const pdf = new jsPDF({
                orientation: 'portrait',
                unit: 'pt',
                format: 'a4'
            });

            // Calculate PDF dimensions to fit the image with margin
            const pdfWidth = 595.28;
            const pdfHeight = 841.89;
            const margin = 30;
            const contentWidth = pdfWidth - 2 * margin;

            // Calculate height while maintaining aspect ratio
            const imgHeight = (canvas.height * contentWidth) / canvas.width;

            // Add title before the image
            pdf.setFontSize(20);
            pdf.setFont(undefined, 'bold');
            pdf.text('KCA 2.0 UAT Bingo Card', pdfWidth / 2, margin + 20, { align: 'center' });

            // Add the image (Bingo Card) to the PDF
            pdf.addImage(imgData, 'PNG', margin, margin + 40, contentWidth, imgHeight);

            pdf.save('KCA_2_0_Bingo_Card_' + new Date().toISOString().slice(0, 10) + '.pdf');

            downloadBtn.textContent = 'Download PDF';
            downloadBtn.disabled = false;
        }

        // Phase 4: Event Listeners
        generateBtn.addEventListener('click', generateCard);
        downloadBtn.addEventListener('click', downloadPDF);

        // Generate the initial card on load
        document.addEventListener('DOMContentLoaded', generateCard);
    </script>
</body>
</html>
